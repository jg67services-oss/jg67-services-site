[build]
  publish = "."

# Redirection www → non-www
[[redirects]]
  from = "https://www.jg67services.fr/*"
  to = "https://jg67services.fr/:splat"
  status = 301
  force = true

# Redirections .html → sans extension (canonicalisation URLs)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/service.html"
  to = "/service"
  status = 301
  force = true

